<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
<link rel="stylesheet" href="style.css">
    
</head>
<body>
    <h2>Background Color Changer</h2>

    <button onclick="startChanging()">Start</button>
    <button onclick="stopChanging()">Stop</button>

    <script>
        const colors = [
            "red",
            "blue",
            "green",
            "yellow",
            "purple",
            "orange",
            "pink",
            "skyblue",
            "lightgreen",
            "gold"
        ];

        let intervalId;

        function startChanging() {

            // Prevent multiple intervals
            clearInterval(intervalId);

            intervalId = setInterval(function () {

                const randomIndex = Math.floor(Math.random() * colors.length);

                document.body.style.backgroundColor = colors[randomIndex];

            }, 500); // Change every 500 milliseconds

        }

        function stopChanging() {
            clearInterval(intervalId);
        }
    </script>
    <h2>Password Strength Checker</h2>

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <p id="message">Start typing...</p>
    <button onclick="changecolor()">Change Background Color</button>

    <script>
        function changecolor() {
            document.body.style.backgroundColor = "red";
        }
        const password = document.getElementById("password");
        const message = document.getElementById("message");

        // Block the Space key
        password.addEventListener("keydown", function(event) {
            if (event.key === " ") {
                event.preventDefault();
            }
        });

        // Check password while typing
        password.addEventListener("input", function () {

            const value = password.value;

            const hasSixCharacters = value.length >= 6;
            const hasNumber = /\d/.test(value);

            // Multiple conditions combined
            if (hasSixCharacters && hasNumber) {
                message.textContent = "Strong Password";
                message.style.color = "green";
            }
            else if (value.length === 0) {
                message.textContent = "Start typing...";
                message.style.color = "black";
            }
            else {
                message.textContent = "Weak Password";
                message.style.color = "red";
            }
        });
    </script>

</body>
</html>
