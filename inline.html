<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #f2f2f2; font-family: Arial, sans-serif; padding: 20px;">
    <form style ="display: flex; flex-direction: column; max-width:250px; margin: 0 auto; width: 100%; background-color: #948282; padding: 20px; border-radius: 7px; box-shadow: 0 2px 4px rgba(255, 0, 0, 0.1);">
        <lable for="name">Name:</lable><br>
        <input type="text" placeholder="Enter your name" id="name" name="name" required><br>
        <lable for="email">Email:</lable><br>
        <input type="email" placeholder="Enter your email" id="email" name="email" required><br>
        <lable for="password" >Password:</lable><br>
        <input type="password" placeholder="Enter your password" id="password" name="password" required><br>
        <lable for="Message" >Message:</lable><br>
        <textarea id="Message" name="Message" rows="4" cols="50" required></textarea><br>
    </form><br>
    <input type="submit" value="Submit"
style="background-color: blue; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; text-align: center; display: block; margin: 0 auto;">

    
</body>
</html>
